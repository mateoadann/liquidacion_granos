services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-liquidacion_granos}
      POSTGRES_USER: ${POSTGRES_USER:-liquidacion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liquidacion}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      - TZ=America/Argentina/Cordoba
    depends_on:
      - postgres
      - redis
    ports:
      - "5001:5001"
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./certificados_clientes:/app/certificados_clientes
    command: sh -c "flask --app run.py db upgrade && flask --app run.py run --host=0.0.0.0 --port=5001 --debug"

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      - TZ=America/Argentina/Cordoba
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - ./data:/app/data
      - ./certificados_clientes:/app/certificados_clientes
    command: sh -c "flask --app run.py db upgrade && python worker.py"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      - VITE_API_BASE=http://localhost:5001/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
