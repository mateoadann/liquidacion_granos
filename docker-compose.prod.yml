services:
  backend:
    build:
      context: ./backend
    container_name: granos_api
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=America/Argentina/Cordoba
    command: sh -c "flask --app run.py db upgrade && gunicorn -w 2 -b 0.0.0.0:5001 run:app"
    volumes:
      - ./data:/app/data:ro
      - ./certificados_clientes:/app/certificados_clientes
    expose:
      - "5001"
    networks:
      - proxy_net

  worker:
    build:
      context: ./backend
    container_name: granos_worker
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=America/Argentina/Cordoba
      - PLAYWRIGHT_HEADLESS=false
    depends_on:
      - backend
    # Worker runs under a virtual X display (Playwright headed). The entrypoint
    # execs the Python worker as PID 1 so a worker crash takes the container
    # down and restart:unless-stopped recovers it. See worker-entrypoint.sh for
    # why xvfb-run is not used here.
    command: ./worker-entrypoint.sh
    healthcheck:
      # Fail if no RQ worker is registered in Redis — catches the "container Up
      # but worker dead" state so Docker restarts it.
      test: ["CMD", "python", "-c", "from app import create_app; from redis import Redis; from rq import Worker; app=create_app(); ctx=app.app_context(); ctx.push(); r=Redis.from_url(app.config['REDIS_URL']); exit(0 if Worker.all(connection=r) else 1)"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    volumes:
      - ./data:/app/data:ro
      - ./certificados_clientes:/app/certificados_clientes
    networks:
      - proxy_net

  scheduler_worker:
    build:
      context: ./backend
    container_name: granos_scheduler
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=America/Argentina/Cordoba
    depends_on:
      - backend
    command: python -u worker_scheduler.py
    volumes:
      - ./data:/app/data:ro
      - ./certificados_clientes:/app/certificados_clientes
    networks:
      - proxy_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: granos_frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true
